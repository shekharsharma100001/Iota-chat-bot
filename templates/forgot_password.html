<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iota - Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-darkBg text-white min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-blue-900 to-black">

    <div class="glass p-10 rounded-2xl shadow-2xl w-full max-w-md transition-all duration-300">
        <h1 class="text-3xl font-bold mb-2 text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Reset Password</h1>
        <p class="text-gray-400 text-center mb-8 text-sm">Enter your email and we'll send you a secure reset link.</p>

        <form id="forgot-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300">Email Address</label>
                <input type="email" id="email" class="mt-1 block w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" required>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold rounded-xl shadow-lg transform transition hover:scale-[1.02]">
                Send Reset Link
            </button>
        </form>

        <div id="status-msg" class="mt-4 text-center text-sm hidden"></div>

        <p class="mt-6 text-center text-sm text-gray-400">
            <a href="/" class="text-blue-400 hover:text-blue-300 font-semibold transition-colors">Back to Login</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('forgot-form');
        const statusMsg = document.getElementById('status-msg');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Sending...";
            
            try {
                const res = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email})
                });
                const data = await res.json();
                
                statusMsg.classList.remove('hidden', 'text-red-400');
                statusMsg.classList.add('text-green-400');
                statusMsg.innerText = data.message;
            } catch (err) {
                console.error(err);
                statusMsg.classList.remove('hidden', 'text-green-400');
                statusMsg.classList.add('text-red-400');
                statusMsg.innerText = "A network error occurred.";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Send Reset Link";
            }
        });
    </script>
</body>
</html>
