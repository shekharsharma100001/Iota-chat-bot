<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iota - Create New Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f172a',
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-darkBg text-white min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-blue-900 to-black">

    <div class="glass p-10 rounded-2xl shadow-2xl w-full max-w-md transition-all duration-300">
        <h1 class="text-3xl font-bold mb-2 text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">New Password</h1>
        <p class="text-gray-400 text-center mb-8 text-sm">Please enter your new secure password.</p>

        <form id="reset-form" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300">New Password</label>
                <input type="password" id="password" class="mt-1 block w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300">Confirm Password</label>
                <input type="password" id="confirm-password" class="mt-1 block w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow" required>
            </div>

            <button type="submit" id="submit-btn" class="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold rounded-xl shadow-lg transform transition hover:scale-[1.02]">
                Update Password
            </button>
        </form>

        <div id="status-msg" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script>
        const form = document.getElementById('reset-form');
        const statusMsg = document.getElementById('status-msg');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                statusMsg.classList.remove('hidden', 'text-green-400');
                statusMsg.classList.add('text-red-400');
                statusMsg.innerText = "Passwords do not match!";
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Updating...";
            
            try {
                // The token is embedded in the URL path by Flask
                const token = window.location.pathname.split('/').pop();
                
                const res = await fetch(`/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password})
                });
                const data = await res.json();
                
                if (res.ok) {
                    statusMsg.classList.remove('hidden', 'text-red-400');
                    statusMsg.classList.add('text-green-400');
                    statusMsg.innerText = data.message;
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    statusMsg.classList.remove('hidden', 'text-green-400');
                    statusMsg.classList.add('text-red-400');
                    statusMsg.innerText = data.error || "An error occurred.";
                }
            } catch (err) {
                console.error(err);
                statusMsg.classList.remove('hidden', 'text-green-400');
                statusMsg.classList.add('text-red-400');
                statusMsg.innerText = "A network error occurred.";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Update Password";
            }
        });
    </script>
</body>
</html>
